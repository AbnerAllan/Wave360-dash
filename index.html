.app-wrap{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sb-logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo-box{width:30px;height:30px;border-radius:50%;overflow:hidden;background:#fff;flex-shrink:0}
.sb-brand{font-size:13px;font-weight:800;color:var(--text)}
.sb-sub{font-size:9px;color:var(--text3);letter-spacing:.1em}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sbi{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.sbi:hover{background:var(--bg3);border-color:var(--border)}
.sbi.on{background:var(--bg4);border-color:var(--border2)}
.sbi.on .sbi-ic{color:var(--orange)}
.sbi.on .sbi-lb{color:var(--text);font-weight:600}
.sbi-ic{font-size:14px;width:16px;text-align:center;color:var(--text3);flex-shrink:0}
.sbi-lb{font-size:12px;color:var(--text2)}
.sb-div{height:1px;background:var(--border);margin:6px 10px}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border)}
.sb-rname{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px}
.sb-rsub{font-size:10px;color:var(--text3)}
.sb-lock{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;margin-top:6px;border:1px solid var(--border)}
.sb-lock:hover{background:var(--bg3)}
.main{margin-left:220px;display:flex;flex-direction:column;min-width:0;min-height:100vh}
.topbar{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:var(--bg);position:sticky;top:0;z-index:5}
.pg-title{font-size:15px;font-weight:700;color:var(--text)}
.pg-sub{font-size:11px;color:var(--text3);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.clk{font-size:12px;color:var(--text2);background:var(--bg3);padding:4px 10px;border-radius:6px;border:1px solid var(--border)}
.ev-top-btn{font-size:11px;padding:4px 12px;border-radius:6px;background:rgba(244,123,32,.15);border:1px solid rgba(244,123,32,.3);color:var(--orange);cursor:pointer;font-weight:600}
.pgc{flex:1;padding:16px 18px;overflow-y:auto}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease}
.kgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.k1::before{background:linear-gradient(90deg,var(--red),var(--pink))}

function saveE(){try{localStorage.setItem(EK,JSON.stringify(EV));}catch(e){}}
function loadD(){try{var r=localStorage.getItem(DK);if(!r)return false;var s=JSON.parse(r);if(s.w!==gMon())return false;T=s.T;K=s.K;return true;}catch(e){return false;}}
function loadE(){try{var r=localStorage.getItem(EK);if(r){EV=JSON.parse(r);return true;}}catch(e){}return false;}
function initD(){DEPTS.forEach(function(d){T[d.id]=d.def.map(function(t){return{text:t,pri:"medium",done:false,id:uid(),fhr:false,fev:false,fdg:false,prog:"To Do"};});K[d.id]=d.kpis.map(function(n){return{name:n,val:0};});});}
function aHist(){var h={};try{h=JSON.parse(localStorage.getItem(HK)||"{}");}catch(e){}var wl=gMon();DEPTS.forEach(function(d){if(!h[d.id])h[d.id]=[];var ks=K[d.id]||[],avg=ks.length?Math.round(ks.reduce(function(a,k){return a+k.val;},0)/ks.length):0;if(!h[d.id].find(function(x){return x.w===wl;})){h[d.id].push({w:wl,avg:avg});if(h[d.id].length>24)h[d.id].shift();}});try{localStorage.setItem(HK,JSON.stringify(h));}catch(e){}}
async function syncDB(){var wl=gWL();try{var r1=await sb.from("tasks").select("*").eq("week_label",wl).order("created_at");var r2=await sb.from("kpis").select("*").eq("week_label",wl);var td=r1.data||[],kd=r2.data||[];DEPTS.forEach(function(d){var dt=td.filter(function(t){return t.department===d.id;});if(dt.length){T[d.id]=dt.map(function(t){return Object.assign({},t,{prog:t.progress||"To Do",fev:!!t.from_ev,fdg:!!t.from_digital,fhr:!!t.from_hr});});}else{seedT(d.id,wl);}var dk=kd.filter(function(k){return k.department===d.id;});if(dk.length)K[d.id]=d.kpis.map(function(n){return{name:n,val:(dk.find(function(k){return k.name===n;})||{}).val||0};});});saveD();}catch(e){console.warn("sync",e);}}
async function seedT(did,wl){var d=DEPTS.find(function(x){return x.id===did;});var rows=d.def.map(function(text){return{department:did,text:text,priority:"medium",done:false,week_label:wl,from_hr:false,from_ev:false,from_digital:false,progress:"To Do"};});try{var res=await sb.from("tasks").insert(rows).select();if(res.data&&res.data.length){T[did]=res.data.map(function(t){return Object.assign({},t,{prog:"To Do",fev:false,fdg:false,fhr:false});});saveD();}}catch(e){}}

function gRL(){if(CR==="ceo")return "CEO";if(CR==="ov")return "Manager Overview";var pm=PROD.find(function(m){return m.id===CR;});if(pm)return pm.role+" - "+pm.lb;var dm=DEPTS.find(function(m){return m.id===CR;});if(dm)return dm.lb;return CR;}
function isMgr(){return CR==="ov"||CR==="ceo"||(CR==="hr"&&HRM==="ov");}
function canMA(){return ["ceo","hr","admin","ov"].includes(CR);}
function kCh(){Object.values(CHT).forEach(function(c){try{c.destroy();}catch(e){}});CHT={};}
function render(){if(!CR)renderPin();else renderApp();}

    '<div style="font-size:24px;font-weight:800;color:#E8302A;margin-bottom:2px">Wave360</div>'+
    '<div style="font-size:10px;letter-spacing:.3em;color:#5a5a72;margin-bottom:4px">A F R I C A</div>'+
    '<div style="font-size:11px;color:#5a5a72;font-style:italic;margin-bottom:24px">Think Beyond the Wave</div>'+

function pp(v){
  if(v==="")return;
  if(v==="BACK"){EP=EP.slice(0,-1);uDots();return;}
  if(EP.length>=4)return;
  EP+=v;uDots();
  if(EP.length===4)setTimeout(cPin,150);
}
function uDots(){
  for(var i=0;i<4;i++){
    var d=document.getElementById("pd"+i);
    if(!d)continue;
    if(i<EP.length){d.style.background="#7B3FA0";d.style.borderColor="#7B3FA0";}
    else{d.style.background="#1c1c22";d.style.borderColor="#35354a";}
  }
}
function cPin(){
  var m=Object.entries(PINS).find(function(e){return e[1]===EP;});
  if(m){CR=m[0];AM="dash";AP="overview";SD=null;EKI=null;HRM="dept";SDEPTS=[];renderApp();}
  else{var pe=document.getElementById("perr");if(pe)pe.textContent="Incorrect PIN - try again";EP="";uDots();setTimeout(function(){var e=document.getElementById("perr");if(e)e.textContent="";},2000);}
}

function handleEnter(e,fn){if(e.key==="Enter"||e.keyCode===13){eval(fn+"()");}}
function logout(){CR=null;EP="";kCh();if(CLKI){clearInterval(CLKI);CLKI=null;}render();}
function renderApp(){if(AM==="events")renderEV();else renderDash();}

    '<div class="sb-nav">'+nb+'<div class="sb-div"></div>'+hrB+evB+'</div>'+
    '<div class="sb-foot"><div class="sb-rname">'+gRL()+'</div><div class="sb-rsub">'+gWL()+'</div>'+
    '<div class="sb-lock" onclick="logout()"><span style="font-size:13px;color:#5a5a72">x</span><span style="font-size:11px;color:#5a5a72;margin-left:8px">Lock dashboard</span></div>'+

  kCh();

function setPage(id){AP=id;SD=null;EKI=null;kCh();var tls={overview:"Overview",departments:"Departments","kpi-history":"KPI History",report:"Weekly Report",assigned:"Assigned Tasks","dg-assign":"Assign to Graphic"};var el=document.getElementById("pgt");if(el)el.textContent=tls[id]||id;document.querySelectorAll(".sbi").forEach(function(s){var l=s.querySelector(".sbi-lb");if(l)s.classList.toggle("on",l.textContent===(tls[id]||id));});rPage();}
function tHRM(){HRM=HRM==="dept"?"ov":"dept";renderDash();}
function oEV(){AM="events";EN="overview";kCh();if(CLKI){clearInterval(CLKI);CLKI=null;}renderEV();}
function bkD(){AM="dash";renderDash();}

function rPage(){var el=document.getElementById("pgc");if(!el)return;if(AP==="overview")el.innerHTML=rOv();else if(AP==="departments")el.innerHTML=rDepts();else if(AP==="kpi-history")el.innerHTML=rHist();else if(AP==="report")el.innerHTML=rRpt();else if(AP==="assigned")el.innerHTML=rAssigned();else if(AP==="dg-assign")el.innerHTML=rDGAssign();setTimeout(dCharts,80);}

function gSt(){var tot=0,dn=0,aK=0,kc=0,st=0;DEPTS.forEach(function(d){var ts=T[d.id]||[];tot+=ts.length;dn+=ts.filter(function(t){return t.done;}).length;(K[d.id]||[]).forEach(function(k){aK+=k.val;kc++;});if(isSt(d.id))st++;});return{tot:tot,dn:dn,pct:tot?Math.round(dn/tot*100):0,ak:kc?Math.round(aK/kc):0,st:st};}

function rOv(){
  var mg=isMgr(),s=gSt();
  var myD=DEPTS.find(function(d){return d.id===CR;});
  var myTs=myD?T[CR]||[]:[];var myKs=myD?K[CR]||[]:[];
  var myDn=myTs.filter(function(t){return t.done;}).length;
  var myAvg=myKs.length?Math.round(myKs.reduce(function(a,k){return a+k.val;},0)/myKs.length):0;
  var hs=mg?
    '<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:#E8302A">'+s.st+'</div><div style="font-size:9px;color:#5a5a72;text-transform:uppercase">Pending</div></div>'+
    '<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:#F47B20">'+s.dn+'/'+s.tot+'</div><div style="font-size:9px;color:#5a5a72;text-transform:uppercase">Tasks done</div></div>'+
    '<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:'+kC(s.ak)+'">'+s.ak+'%</div><div style="font-size:9px;color:#5a5a72;text-transform:uppercase">Avg KPI</div></div>'
    :
    '<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:#F47B20">'+myDn+'/'+myTs.length+'</div><div style="font-size:9px;color:#5a5a72;text-transform:uppercase">My tasks</div></div>'+
    '<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:'+kC(myAvg)+'">'+myAvg+'%</div><div style="font-size:9px;color:#5a5a72;text-transform:uppercase">KPI avg</div></div>';
  var dCards="";
  if(mg){
    dCards='<div style="margin-bottom:14px"><div class="sl" style="margin-bottom:8px">Department overview - click to view details</div><div class="odg">'+
      DEPTS.map(function(d){
        var ts=T[d.id]||[],ks=K[d.id]||[],dn2=ts.filter(function(t){return t.done;}).length,p=ts.length?Math.round(dn2/ts.length*100):0;
        return '<div class="odc" data-did="'+d.id+'" onclick="vDOv(this.dataset.did)">'+
          '<div class="odn"><div class="odd" style="background:'+d.cl+'"></div>'+d.lb.split(" ")[0]+'</div>'+
          '<div class="odr">'+pRing(p,d.cl,42)+'</div>'+
          ks.map(function(k){return '<div class="odkr"><span class="odkn">'+k.name+'</span><div class="odkb"><div class="odkf" style="width:'+k.val+'%;background:'+kC(k.val)+'"></div></div><span class="odkv" style="color:'+kC(k.val)+'">'+k.val+'%</span></div>';}).join("")+
          '<div class="odt">'+dn2+'/'+ts.length+' tasks'+(isSt(d.id)?'<div class="stw">No updates</div>':'')+'</div>'+
          '</div>';
      }).join("")+
    '</div></div>';
  }
  var aCard="";
  if(mg||CR==="hr"){
    var multi=canMA();
    var dTog=multi?
      '<div style="margin-bottom:8px"><div style="font-size:10px;color:#5a5a72;margin-bottom:6px">Select departments:</div>'+
      '<div class="mdg">'+DEPTS.map(function(d){return '<div class="dtog'+(SDEPTS.includes(d.id)?" on":"")+'" data-did="'+d.id+'" onclick="tDS(this.dataset.did)">'+d.lb.split(" ")[0]+'</div>';}).join("")+'</div></div>':"";
    var sngl=!multi?'<select class="ssel" id="ovd">'+DEPTS.map(function(d){return '<option value="'+d.id+'">'+d.lb+'</option>';}).join("")+'</select>':"";
    aCard='<div class="acard">'+
      '<div class="atit">'+(CR==="hr"?"Assign tasks to departments":(CR==="ceo"?"CEO task assignment":"Add task to department"))+'</div>'+
      dTog+
      '<div class="arow"><input type="text" id="ovi" placeholder="'+(multi?"Task for selected depts...":"Type task...")+'">'+
      sngl+
      '<select class="ssel" id="ovp"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>'+
      '<button onclick="aFOv()">Assign</button></div></div>';
  }
  return '<div style="background:#141418;border:1px solid #2a2a35;border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">'+
    logo(44)+'<div style="flex:1"><div style="font-size:15px;font-weight:800;color:#f0f0f5">Wave360 Africa</div><div style="font-size:11px;color:#5a5a72">Think Beyond the Wave - '+gWL()+'</div></div>'+
    '<div style="display:flex;gap:14px;flex-wrap:wrap">'+hs+'</div></div>'+
    '<div class="kgrid">'+

    '<div class="cc"><div class="ctit">Task completion <span class="csub">this week</span></div><canvas id="cht-dn" height="150"></canvas></div>'+

function vDOv(id){var a=document.getElementById("dma");if(!a)return;if(SD===id){SD=null;a.innerHTML="";return;}SD=id;var d=DEPTS.find(function(x){return x.id===id;});if(!d)return;a.innerHTML=rDP(d,DTB[id]||"tasks");}
function tDS(id){var i=SDEPTS.indexOf(id);if(i>-1)SDEPTS.splice(i,1);else SDEPTS.push(id);rPage();}
function aFOv(){
  var inp=document.getElementById("ovi"),ps=document.getElementById("ovp");
  var text=inp.value.trim();if(!text){toast("Please type a task");return;}
  var isHR=CR==="hr",multi=canMA();
  var tgts=multi?(SDEPTS.length>0?SDEPTS.slice():[DEPTS[0].id]):[(document.getElementById("ovd")||{}).value||DEPTS[0].id];
  var asgn=0;
  tgts.forEach(function(tid){
    if((T[tid]||[]).length>=10){toast("Max 10 tasks");return;}
    if(!T[tid])T[tid]=[];
    T[tid].push({text:text,pri:ps.value,done:false,id:uid(),fhr:isHR,fev:false,fdg:false,prog:"To Do"});
    asgn++;
    sb.from("tasks").insert({department:tid,text:text,priority:ps.value,done:false,week_label:gWL(),from_hr:isHR,from_ev:false,from_digital:false,progress:"To Do"}).then(function(){}).catch(function(){});
  });
  inp.value="";if(multi)SDEPTS=[];saveD();
  toast(asgn>1?"Assigned to "+asgn+" departments":"Task assigned!");
  rPage();
}

function rAssigned(){
  var all=[];DEPTS.forEach(function(d){(T[d.id]||[]).forEach(function(t){if(t.fhr||t.fdg){all.push(Object.assign({},t,{did:d.id,dlb:d.lb,dcl:d.cl}));}});});
  var tot=all.length,dn=all.filter(function(t){return t.done;}).length,ip=all.filter(function(t){return t.prog==="In Progress";}).length,rv=all.filter(function(t){return t.prog==="Review";}).length;
  var byD={};all.forEach(function(t){if(!byD[t.did])byD[t.did]={lb:t.dlb,cl:t.dcl,tasks:[]};byD[t.did].tasks.push(t);});
  var secs=Object.keys(byD).map(function(did){
    var dept=byD[did],ddn=dept.tasks.filter(function(t){return t.done;}).length;
    return '<div style="background:#141418;border:1px solid #2a2a35;border-radius:10px;padding:12px;margin-bottom:10px">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:8px;height:8px;border-radius:50%;background:'+dept.cl+'"></div><span style="font-size:12px;font-weight:700;color:#f0f0f5;flex:1">'+dept.lb+'</span><span style="font-size:11px;font-weight:700;color:'+kC(dept.tasks.length?Math.round(ddn/dept.tasks.length*100):0)+'">'+ddn+'/'+dept.tasks.length+' done</span></div>'+
      dept.tasks.map(function(t){
        return '<div class="ti">'+
          '<div class="chk'+(t.done?" dn":"")+'" data-did="'+did+'" data-tid="'+t.id+'" data-nd="'+(t.done?"0":"1")+'" onclick="tTask(this.dataset.did,this.dataset.tid,this.dataset.nd==String(1))"></div>'+
          '<span class="tt'+(t.done?" dn":"")+'">'+t.text+'</span>'+
          (t.fhr?'<span class="hrtag">HR</span>':'')+
          (t.fdg?'<span class="dgtag">Digital</span>':'')+
          '<span class="pf p'+(t.pri||"m").charAt(0)+'">'+((t.pri||"medium").toUpperCase())+'</span>'+
          '<select class="psel" data-did="'+did+'" data-tid="'+t.id+'" onchange="uProg(this.dataset.did,this.dataset.tid,this.value)" style="background:'+SB2[t.prog||"To Do"]+';color:'+SC[t.prog||"To Do"]+'">'+
          STAGES.map(function(s){return '<option value="'+s+'"'+(t.prog===s?" selected":"")+'>'+s+'</option>';}).join("")+
          '</select></div>';
      }).join("")+
      '</div>';
  }).join("");
  var asgSec='<div class="acard"><div class="atit">Assign new task</div>'+
    '<div style="margin-bottom:8px"><div style="font-size:10px;color:#5a5a72;margin-bottom:6px">Select departments:</div>'+
    '<div class="mdg">'+DEPTS.map(function(d){return '<div class="dtog'+(SDEPTS.includes(d.id)?" on":"")+'" data-did="'+d.id+'" onclick="tDS(this.dataset.did)">'+d.lb.split(" ")[0]+'</div>';}).join("")+'</div></div>'+
    '<div class="arow"><input type="text" id="ati" placeholder="Type task..." onkeydown="if(event.keyCode===13)aFAT()">'+
    '<select class="ssel" id="atp"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>'+
    '<button onclick="aFAT()">Assign</button></div></div>';
  return '<div class="kgrid"><div class="kcard k1"><div class="klbl">Total assigned</div><div class="kval">'+tot+'</div></div>'+
    '<div class="kcard k2"><div class="klbl">In progress</div><div class="kval" style="color:#F47B20">'+ip+'</div></div>'+
    '<div class="kcard k3"><div class="klbl">In review</div><div class="kval" style="color:#7B3FA0">'+rv+'</div></div>'+
    '<div class="kcard k4"><div class="klbl">Completed</div><div class="kval" style="color:#1D9E75">'+dn+'</div></div></div>'+

  return '<div class="evsg">'+
    '<div class="evs"><div class="lbl">Projects</div><div class="val">'+pr.length+'</div></div>'+
    '<div class="evs"><div class="lbl">Events</div><div class="val">'+ev2.length+'</div></div>'+
    '<div class="evs"><div class="lbl">Tasks done</div><div class="val" style="color:#4dd4a0">'+cp+'</div></div>'+
    '<div class="evs"><div class="lbl">In progress</div><div class="val" style="color:#ffaa55">'+ip+'</div></div>'+
    '</div>'+
    '<div class="bcb"><div class="bct"><div class="bcd"></div>Company broadcasts</div>'+
    '<div class="bcl">'+(bcs.length?bcs.map(function(b){return '<div class="bci"><span class="bcf">'+b.from+'</span><span class="bcm">'+b.msg+'</span><span class="bctm">'+b.tm+'</span></div>';}).join(""):'<div style="font-size:11px;color:rgba(255,255,255,.35);font-style:italic;padding:4px 0">No broadcasts yet</div>')+'</div>'+
    (canBC?'<div class="bcir"><input type="text" id="bci" placeholder="Send message to all departments..." onkeydown="if(event.keyCode===13)sBc()"><button onclick="sBc()">Broadcast</button></div>':'<div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px">Only CEO, Judy and HR can broadcast</div>')+
    '</div>'+
    (EV.projects.length===0?'<div style="text-align:center;padding:2rem;color:#5a5a72;font-size:12px">No projects or events yet</div>':
    '<div class="seh"><div class="set">Recent activity</div></div><div class="pgrid">'+EV.projects.slice(-4).reverse().map(rPC).join("")+'</div>');
}
function sBc(){var inp=document.getElementById("bci");var msg=inp.value.trim();if(!msg)return;var from=gRL().split(" - ").pop();if(!EV.broadcasts)EV.broadcasts=[];EV.broadcasts.push({id:uid(),from:from,msg:msg,tm:nowT(),dt:tod()});if(EV.broadcasts.length>50)EV.broadcasts.shift();inp.value="";saveE();toast("Broadcast sent");rEP();}
function rEL(type){var items=EV.projects.filter(function(p){return p.type===type;});var canC=CAN_C.includes(CR)||PROD.some(function(m){return m.id===CR;});return '<div class="seh"><div class="set">'+(type==="Project"?"Projects":"Events")+' ('+items.length+')</div>'+(canC?'<button class="aev" data-tp="'+type+'" onclick="oEM(this.dataset.tp)">+ New '+type+'</button>':'')+'</div>'+(items.length===0?'<div style="text-align:center;padding:2rem;color:#5a5a72;font-size:12px">No '+type.toLowerCase()+'s yet</div>':'<div class="pgrid">'+items.map(rPC).join("")+'</div>');}
function rPC(p){
  var tks=p.tasks||[],dn=tks.filter(function(t){return t.st==="Done";}).length,pct=tks.length?Math.round(dn/tks.length*100):0;
  var canE=CAN_C.includes(CR)||PROD.some(function(m){return m.id===CR;});
  var tR=tks.map(function(t){
    return '<div class="ptk">'+
      '<div class="psd" style="background:'+SC[t.st||"To Do"]+'"></div>'+
      '<span class="ptxt'+(t.st==="Done"?" Done":"")+'">'+t.text+'</span>'+
      '<span class="pasgn">'+(t.asgn||"")+'</span>'+
      (t.aDepts&&t.aDepts.length?'<span style="font-size:9px;color:#ffaa55;padding:1px 5px;border-radius:3px;background:rgba(244,123,32,.1)">to '+t.aDepts.map(function(d){return(DEPTS.find(function(x){return x.id===d;})||{lb:d}).lb.split(" ")[0];}).join(",")+'</span>':"")+
      (canE?'<select class="pssl" data-pid="'+p.id+'" data-tid="'+t.id+'" onchange="uPTS(this.dataset.pid,this.dataset.tid,this.value)" style="background:'+SB2[t.st||"To Do"]+';color:'+SC[t.st||"To Do"]+'">'+STAGES.map(function(s){return '<option value="'+s+'"'+(t.st===s?" selected":"")+'>'+s+'</option>';}).join("")+'</select>':'<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:'+SB2[t.st||"To Do"]+';color:'+SC[t.st||"To Do"]+'">'+(t.st||"To Do")+'</span>')+
      (canE?'<span class="pdel" data-pid="'+p.id+'" data-tid="'+t.id+'" onclick="dPT(this.dataset.pid,this.dataset.tid)">x</span>':'')+
      '</div>';
  }).join("");
  var addR=canE?'<div class="ptadd"><input type="text" placeholder="Add task..." id="pt_'+p.id+'" data-pid="'+p.id+'" onkeydown="if(event.keyCode===13)aPT(this.dataset.pid)"><select class="asl" id="pa_'+p.id+'">'+ALL_M.map(function(m){return '<option value="'+m.lb+'">'+m.lb+'</option>';}).join("")+'</select><select class="asl" id="pd_'+p.id+'" multiple style="height:32px">'+DEPTS.map(function(d){return '<option value="'+d.id+'">'+d.lb.split(" ")[0]+'</option>';}).join("")+'</select><button data-pid="'+p.id+'" onclick="aPT(this.dataset.pid)">+ Add</button></div><div style="font-size:9px;color:#5a5a72;margin-top:4px">Hold Ctrl to select multiple depts</div>':"";
  return '<div class="pcard">'+
    '<div class="pch"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span class="ptyp t'+p.type.charAt(0)+'r">'+p.type+'</span>'+(canE?'<span style="font-size:10px;color:#5a5a72;cursor:pointer;margin-left:auto" data-pid="'+p.id+'" onclick="dPrj(this.dataset.pid)">Delete</span>':'')+'</div><div class="pnm">'+p.nm+'</div>'+(p.ds?'<div class="pds">'+p.ds+'</div>':'')+'</div>'+
    '<div class="pmt">'+(p.dl?'<span>Due: '+p.dl+'</span>':'')+'<span class="pow">'+p.ow+'</span><span style="margin-left:auto;color:'+(pct===100?"#4dd4a0":"#5a5a72")+(pct===100?';font-weight:700':'')+'">'+pct+'% done</span></div>'+
    '<div class="pta"><div class="ptt">Tasks ('+dn+'/'+tks.length+')</div>'+(tks.length===0?'<div style="font-size:11px;color:#5a5a72;font-style:italic;padding:4px 0">No tasks yet</div>':'')+tR+addR+'</div>'+
    '</div>';
}
function rETm(){var all=[{id:"ceo",lb:"CEO",role:"Chief Executive",cl:"#1a1a18"}].concat(PROD).concat(DEPTS.map(function(d){return Object.assign({},d,{role:d.lb});}));return '<div class="seh"><div class="set">Wave360 Team</div></div><div class="tgrid">'+all.map(function(m){var myT=EV.projects.flatMap(function(p){return (p.tasks||[]).filter(function(t){return t.asgn===m.lb;});});var dn=myT.filter(function(t){return t.st==="Done";}).length;var init=m.lb.split(" ").map(function(w){return w[0];}).join("").substring(0,2).toUpperCase();return '<div class="tcard"><div class="tav" style="background:'+m.cl+'">'+init+'</div><div class="tnm">'+m.lb+'</div><div class="trl">'+(m.role||m.lb)+'</div><div class="ttk">'+dn+'/'+myT.length+' tasks</div></div>';}).join("")+'</div>';}
function rEMod(){return '<div class="movl" id="evm" style="display:none" onclick="cEMb(event)"><div class="mo"><div class="mot" id="emttl">New Project / Event</div><div class="mf"><label>Type</label><select id="mtp" style="width:100%;padding:8px 10px;border:1px solid #2a2a35;border-radius:7px;background:#1c1c22;color:#f0f0f5;font-size:12px"><option value="Project">Project</option><option value="Event">Event</option></select></div><div class="mf"><label>Name</label><input type="text" id="mnm" placeholder="e.g. Brand Video Campaign"></div><div class="mf"><label>Description</label><textarea id="mds" placeholder="Brief description..."></textarea></div><div class="mf"><label>Owner / Lead</label><select id="mow" style="width:100%;padding:8px 10px;border:1px solid #2a2a35;border-radius:7px;background:#1c1c22;color:#f0f0f5;font-size:12px">'+ALL_M.map(function(m){return '<option value="'+m.lb+'">'+m.lb+'</option>';}).join("")+'</select></div><div class="mf"><label>Deadline</label><input type="date" id="mdl" style="color-scheme:dark"></div><div class="mbs"><button class="mcl" onclick="cEM()">Cancel</button><button class="msv" onclick="svP()">Create</button></div></div></div>';}
function oEM(tp){tp=tp||"Project";document.getElementById("evm").style.display="flex";document.getElementById("mtp").value=tp;document.getElementById("emttl").textContent="New "+tp;setTimeout(function(){var e=document.getElementById("mnm");if(e)e.focus();},50);}
function cEM(){document.getElementById("evm").style.display="none";}
function cEMb(e){if(e.target.id==="evm")cEM();}
function svP(){var nm=document.getElementById("mnm").value.trim();if(!nm){toast("Please enter a name");return;}var p={id:uid(),type:document.getElementById("mtp").value,nm:nm,ds:document.getElementById("mds").value.trim(),ow:document.getElementById("mow").value,dl:document.getElementById("mdl").value,tasks:[]};EV.projects.push(p);saveE();cEM();toast(p.type+" created");document.getElementById("mnm").value="";document.getElementById("mds").value="";document.getElementById("mdl").value="";rEP();}
function dPrj(id){if(!confirm("Delete this?"))return;EV.projects=EV.projects.filter(function(p){return p.id!==id;});saveE();toast("Deleted");rEP();}
function aPT(pId){var inp=document.getElementById("pt_"+pId),as=document.getElementById("pa_"+pId),ds=document.getElementById("pd_"+pId);var text=inp.value.trim();if(!text){toast("Please type a task");return;}var p=EV.projects.find(function(x){return x.id===pId;});if(!p)return;if(!p.tasks)p.tasks=[];var aDepts=ds?Array.from(ds.selectedOptions).map(function(o){return o.value;}):[]; var nt={id:uid(),text:text,asgn:as?as.value:"",st:"To Do",aDepts:aDepts};p.tasks.push(nt);if(aDepts.length>0){aDepts.forEach(function(did){if(!T[did])T[did]=[];if(T[did].length<10){T[did].push({text:text,pri:"medium",done:false,id:uid(),fhr:false,fev:true,fdg:false,prog:"To Do",evId:nt.id,evPId:pId});sb.from("tasks").insert({department:did,text:text,priority:"medium",done:false,week_label:gWL(),from_hr:false,from_ev:true,from_digital:false,progress:"To Do"}).then(function(){}).catch(function(){});}});saveD();toast("Task added + assigned to "+aDepts.length+" dept"+(aDepts.length>1?"s":""));}else toast("Task added to project");inp.value="";saveE();rEP();}
function uPTS(pId,tId,status){var p=EV.projects.find(function(x){return x.id===pId;});if(!p)return;var t=(p.tasks||[]).find(function(x){return x.id===tId;});if(!t)return;t.st=status;if(t.aDepts&&t.aDepts.length>0){t.aDepts.forEach(function(did){var dt=(T[did]||[]).find(function(x){return x.evId===tId||(x.fev&&x.text===t.text);});if(dt){dt.prog=status;if(status==="Done")dt.done=true;}});saveD();}saveE();rEP();}
function dPT(pId,tId){var p=EV.projects.find(function(x){return x.id===pId;});if(!p)return;p.tasks=(p.tasks||[]).filter(function(t){return t.id!==tId;});saveE();rEP();}

(async function(){
  try{if(!loadD())initD();loadE();aHist();await syncDB();}
  catch(e){console.warn("Init:",e);if(!Object.keys(T).length)initD();}
  render();
})();
</script>
</body>
</html>
