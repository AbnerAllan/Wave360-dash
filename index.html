.pin-logo{width:80px;height:80px;margin:0 auto 16px;border-radius:50%;overflow:hidden;background:#fff}
.sb-logo-img{width:30px;height:30px;border-radius:50%;overflow:hidden;background:#fff;flex-shrink:0}
.logo-sm{width:30px;height:30px;border-radius:50%;overflow:hidden;background:#fff;flex-shrink:0}
.logo-md{width:44px;height:44px;border-radius:50%;overflow:hidden;background:#fff;flex-shrink:0}
.pin-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.pin-wrap{width:320px;text-align:center}
.pin-title{font-size:22px;font-weight:800;color:var(--red);margin-bottom:2px}
.pin-sub{font-size:10px;letter-spacing:.3em;color:var(--text3);margin-bottom:4px}
.pin-slogan{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:20px}
.pin-hint{font-size:11px;color:var(--text3);margin-bottom:12px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border2);transition:all .2s}
.pin-dot.on{background:var(--purple);border-color:var(--purple)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:200px;margin:0 auto 12px}
.pin-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:17px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s}
.pin-btn:hover{background:var(--bg4)}.pin-btn:active{transform:scale(0.94);background:var(--purple)}
.pin-err{font-size:12px;color:var(--red);min-height:16px;margin-top:4px}
.app-wrap{display:flex;min-height:100vh;background:var(--bg)}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-brand{font-size:13px;font-weight:800;color:var(--text)}
.sb-sub-txt{font-size:9px;color:var(--text3);letter-spacing:.1em}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.sb-item:hover{background:var(--bg3);border-color:var(--border)}
.sb-item.active{background:var(--bg4);border-color:var(--border2)}
.sb-item.active .sb-icon{color:var(--orange)}
.sb-item.active .sb-lbl{color:var(--text);font-weight:600}
.sb-icon{font-size:14px;width:16px;text-align:center;color:var(--text3);flex-shrink:0}
.sb-lbl{font-size:12px;color:var(--text2)}
.sb-divider{height:1px;background:var(--border);margin:6px 10px}
.sb-role-area{padding:12px 14px;border-top:1px solid var(--border)}
.sb-role-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px}
.sb-role-sub{font-size:10px;color:var(--text3)}
.sb-lock{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;margin-top:6px;border:1px solid var(--border)}

.sb-lock-txt{font-size:11px;color:var(--text3)}

var STAGE_COLORS = {"To Do":"#5a5a72","In Progress":"#F47B20","Review":"#7B3FA0","Done":"#1D9E75"};
var STAGE_BG = {"To Do":"rgba(90,90,114,0.15)","In Progress":"rgba(244,123,32,0.15)","Review":"rgba(123,63,160,0.15)","Done":"rgba(29,158,117,0.15)"};
var DK="w360_v10_dash", EK="w360_v10_ev", HK="w360_v10_hist";
var tasks={}, kpis={}, evState={projects:[],broadcasts:[]};
var currentRole=null, enteredPin="";
var appMode="dash", activePage="overview", evNav="overview";
var selDept=null, editingKpi=null, hrMode="dept", deptDetailTab={};
var selDepts=[];
var clockInterval=null, charts={};

function uid(){return Math.random().toString(36).slice(2,10);}
function getMonday(){var n=new Date(),d=new Date(n);d.setDate(n.getDate()-((n.getDay()+6)%7));return d.toISOString().slice(0,10);}
function getWeekLabel(){var m=new Date(getMonday()),f=new Date(m);f.setDate(m.getDate()+4);var fmt=function(d){return d.toLocaleDateString("en-KE",{day:"numeric",month:"short"});};return "Week of "+fmt(m)+" – "+fmt(f);}
function getResetMsg(){var n=new Date(),s=new Date(n);s.setDate(n.getDate()+(7-n.getDay())%7||7);s.setHours(23,59,0,0);var h=Math.ceil((s-n)/3600000);return h<24?"Resets in "+h+"h":"Resets Sunday";}
function kpiColor(v){return v>=80?"#1D9E75":v>=50?"#F47B20":"#E8302A";}
function kpiTrend(v){return v>=80?"▲":v>=50?"▶":"▼";}
function isStale(id){return !(tasks[id]||[]).some(function(t){return t.done;})&&!(kpis[id]||[]).some(function(k){return k.val>0;});}
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
function today(){return new Date().toLocaleDateString("en-KE",{day:"numeric",month:"short",year:"numeric"});}
function nowTime(){return new Date().toLocaleTimeString("en-KE",{hour:"2-digit",minute:"2-digit"});}
function pRing(pct,color,sz){sz=sz||52;var r=18,c=2*Math.PI*r,d=pct/100*c;return "<svg width='"+sz+"' height='"+sz+"' viewBox='0 0 44 44'><circle cx='22' cy='22' r='"+r+"' fill='none' stroke='#2a2a35' stroke-width='4'/><circle cx='22' cy='22' r='"+r+"' fill='none' stroke='"+color+"' stroke-width='4' stroke-dasharray='"+d+" "+c+"' stroke-linecap='round' transform='rotate(-90 22 22)'/><text x='22' y='27' text-anchor='middle' font-size='9' font-weight='800' fill='"+color+"'>"+pct+"%</text></svg>";}
function logoDiv(cls){return "<div class='"+cls+" w-logo'></div>";}
function saveD(){try{localStorage.setItem(DK,JSON.stringify({tasks:tasks,kpis:kpis,weekStart:getMonday()}));}catch(e){}}
function saveE(){try{localStorage.setItem(EK,JSON.stringify(evState));}catch(e){}}
function loadD(){try{var r=localStorage.getItem(DK);if(!r)return false;var s=JSON.parse(r);if(s.weekStart!==getMonday())return false;tasks=s.tasks;kpis=s.kpis;return true;}catch(e){return false;}}
function loadE(){try{var r=localStorage.getItem(EK);if(r){evState=JSON.parse(r);return true;}}catch(e){}return false;}
function initData(){DEPTS.forEach(function(d){tasks[d.id]=d.defaultTasks.map(function(t){return {text:t,priority:"medium",done:false,id:uid(),from_hr:false,from_ev:false,from_digital:false,progress:"To Do"};});kpis[d.id]=d.kpis.map(function(n){return {name:n,val:0};});});}
function archiveHistory(){var hist={};try{hist=JSON.parse(localStorage.getItem(HK)||"{}");}catch(e){}var wl=getMonday();DEPTS.forEach(function(d){if(!hist[d.id])hist[d.id]=[];var ks=kpis[d.id]||[],avg=ks.length?Math.round(ks.reduce(function(a,k){return a+k.val;},0)/ks.length):0;if(!hist[d.id].find(function(h){return h.week===wl;})){hist[d.id].push({week:wl,avg:avg});if(hist[d.id].length>24)hist[d.id].shift();}});try{localStorage.setItem(HK,JSON.stringify(hist));}catch(e){}}

async function syncFromDB(){var wl=getWeekLabel();try{var r1=await sb.from("tasks").select("*").eq("week_label",wl).order("created_at");var r2=await sb.from("kpis").select("*").eq("week_label",wl);var td=r1.data,kd=r2.data;DEPTS.forEach(function(d){var dt=(td||[]).filter(function(t){return t.department===d.id;});if(dt.length){tasks[d.id]=dt.map(function(t){return Object.assign({},t,{progress:t.progress||"To Do",from_ev:t.from_ev||false,from_digital:t.from_digital||false});});}else{seedTasks(d.id,wl);}var dk=(kd||[]).filter(function(k){return k.department===d.id;});if(dk.length)kpis[d.id]=d.kpis.map(function(n){return {name:n,val:(dk.find(function(k){return k.name===n;})||{}).val||0};});});saveD();}catch(e){console.warn("DB sync:",e);}}
async function seedTasks(deptId,wl){var dept=DEPTS.find(function(d){return d.id===deptId;});var rows=dept.defaultTasks.map(function(text){return {department:deptId,text:text,priority:"medium",done:false,week_label:wl,from_hr:false,from_ev:false,from_digital:false,progress:"To Do"};});try{var res=await sb.from("tasks").insert(rows).select();if(res.data&&res.data.length){tasks[deptId]=res.data.map(function(t){return Object.assign({},t,{progress:t.progress||"To Do"});});saveD();}}catch(e){}}

function getRoleLabel(){if(currentRole==="ceo")return "CEO";if(currentRole==="overview")return "Manager Overview";var pm=PROD.find(function(m){return m.id===currentRole;});if(pm)return pm.role+" — "+pm.label;var dm=DEPTS.find(function(m){return m.id===currentRole;});if(dm)return dm.label;return currentRole;}
function isMgr(){return ["overview","ceo"].includes(currentRole)||(currentRole==="hr"&&hrMode==="overview");}
function canMultiAssign(){return ["ceo","hr","admin","overview"].includes(currentRole);}
function killCharts(){Object.values(charts).forEach(function(c){try{c.destroy();}catch(e){}});charts={};}
function render(){if(!currentRole)renderPin();else renderApp();}

function renderPin(){
  if(clockInterval){clearInterval(clockInterval);clockInterval=null;}
  killCharts();
  var html="<div class='pin-screen'><div class='pin-wrap'>"+logoDiv("pin-logo")+"<div class='pin-title'>Wave360</div><div class='pin-sub'>A F R I C A</div><div class='pin-slogan'>Think Beyond the Wave</div><div class='pin-hint'>Enter your PIN to continue</div><div class='pin-dots' id='pd'>[0,1,2,3].map</div><div class='pin-grid'></div><div class='pin-err' id='pe'></div></div></div>";
  var dots="";for(var i=0;i<4;i++)dots+="<div class='pin-dot'></div>";
  var btns=[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(function(n){return "<button class='pin-btn' onclick='pinPress('"+n+"')'>"+n+"</button>";}).join("");
  document.getElementById("root").innerHTML="<div class='pin-screen'><div class='pin-wrap'>"+logoDiv("pin-logo")+"<div class='pin-title'>Wave360</div><div class='pin-sub'>A F R I C A</div><div class='pin-slogan'>Think Beyond the Wave</div><div class='pin-hint'>Enter your PIN to continue</div><div class='pin-dots' id='pd'>"+dots+"</div><div class='pin-grid'>"+btns+"</div><div class='pin-err' id='pe'></div></div></div>";
  enteredPin="";
}

function pinPress(v){if(v==="")return;if(v==="⌫"){enteredPin=enteredPin.slice(0,-1);updateDots();return;}if(enteredPin.length>=4)return;enteredPin+=String(v);updateDots();if(enteredPin.length===4)setTimeout(checkPin,150);}
function updateDots(){document.querySelectorAll(".pin-dot").forEach(function(d,i){d.classList.toggle("on",i<enteredPin.length);});}
function checkPin(){var m=Object.entries(PINS).find(function(e){return e[1]===enteredPin;});if(m){currentRole=m[0];appMode="dash";activePage="overview";selDept=null;editingKpi=null;hrMode="dept";selDepts=[];renderApp();}else{var pe=document.getElementById("pe");if(pe)pe.textContent="Incorrect PIN — try again";enteredPin="";updateDots();setTimeout(function(){var e=document.getElementById("pe");if(e)e.textContent="";},2000);}}
function logout(){currentRole=null;enteredPin="";killCharts();if(clockInterval){clearInterval(clockInterval);clockInterval=null;}render();}
function renderApp(){if(appMode==="events")renderEventsApp();else renderDashApp();}

function buildSidebar(){
  var isHR=currentRole==="hr";
  var allCanEv=["ceo","overview","hr","judy","kush","jeff","lead","graphic","digital","admin","accounts","operations"];
  var canEv=allCanEv.includes(currentRole);
  var navItems=[{id:"overview",icon:"⊞",label:"Overview"},{id:"departments",icon:"⊡",label:"Departments"},{id:"kpi-history",icon:"⊘",label:"KPI History"}];
  if(isMgr()||isHR)navItems.push({id:"report",icon:"⊟",label:"Weekly Report"});
  if(["ceo","hr","admin","overview"].includes(currentRole))navItems.push({id:"assigned-tasks",icon:"⊹",label:"Assigned Tasks"});
  if(currentRole==="digital")navItems.push({id:"graphic-assign",icon:"⊕",label:"Assign to Graphic"});
  var nav=navItems.map(function(x){return "<div class='sb-item"+(activePage===x.id?" active":"")+" ' onclick='setPage('"+x.id+"')'><span class='sb-icon'>"+x.icon+"</span><span class='sb-lbl'>"+x.label+"</span></div>";}).join("");
  var hrBtn=isHR?"<div class='sb-item' onclick='toggleHRMode()' style='border-color:rgba(123,63,160,0.3);background:rgba(123,63,160,0.1)'><span class='sb-icon' style='color:#c084fc'>⊛</span><span class='sb-lbl' style='color:#c084fc'>"+(hrMode==="dept"?"Company View":"My Dept")+"</span></div>":"";
  var evBtn=canEv?"<div class='sb-item' onclick='openEvents()' style='border-color:rgba(244,123,32,0.3);background:rgba(244,123,32,0.08)'><span class='sb-icon' style='color:#F47B20'>⊕</span><span class='sb-lbl' style='color:#F47B20'>Events & Projects</span></div>":"";
  return "<div class='sidebar'><div class='sb-logo'>"+logoDiv("sb-logo-img")+"<div><div class='sb-brand'>Wave360</div><div class='sb-sub-txt'>AFRICA</div></div></div><div class='sb-nav'>"+nav+"<div class='sb-divider'></div>"+hrBtn+evBtn+"</div><div class='sb-role-area'><div class='sb-role-name'>"+getRoleLabel()+"</div><div class='sb-role-sub'>"+getWeekLabel()+"</div><div class='sb-lock' onclick='logout()'><span style='font-size:13px;color:#5a5a72'>⊗</span><span class='sb-lock-txt'>Lock dashboard</span></div></div></div>";
}

function renderDashApp(){
  killCharts();
  var canEv=["ceo","overview","hr","judy","digital","admin","accounts","operations","graphic"].includes(currentRole);
  document.getElementById("root").innerHTML="<div class='app-wrap'>"+buildSidebar()+"<div class='main-area'><div class='main-header'><div><div class='page-title' id='pg-title'>Overview</div><div class='page-sub-txt'>"+getWeekLabel()+"</div></div><div class='hdr-right'><div class='clock' id='clk'>--:--</div>"+(canEv?"<div class='ev-btn-top' onclick='openEvents()'>Events & Projects</div>":"")+"</div></div><div class='page-content' id='pg-content'></div></div></div>";
  var tick=function(){var e=document.getElementById("clk");if(e)e.textContent=new Date().toLocaleTimeString("en-KE",{hour:"2-digit",minute:"2-digit",second:"2-digit"});};
  tick();clockInterval=setInterval(tick,1000);
  renderPage();
}

function setPage(id){activePage=id;selDept=null;editingKpi=null;killCharts();var titles={overview:"Overview",departments:"Departments","kpi-history":"KPI History",report:"Weekly Report","assigned-tasks":"Assigned Tasks","graphic-assign":"Assign to Graphic"};var el=document.getElementById("pg-title");if(el)el.textContent=titles[id]||id;document.querySelectorAll(".sb-item").forEach(function(s){var l=s.querySelector(".sb-lbl");if(l)s.classList.toggle("active",l.textContent===(titles[id]||id));});renderPage();}
function toggleHRMode(){hrMode=hrMode==="dept"?"overview":"dept";renderDashApp();}
function openEvents(){appMode="events";evNav="overview";killCharts();if(clockInterval){clearInterval(clockInterval);clockInterval=null;}renderEventsApp();}
function backToDash(){appMode="dash";renderDashApp();}

function renderPage(){var el=document.getElementById("pg-content");if(!el)return;if(activePage==="overview")el.innerHTML=renderOverviewPage();else if(activePage==="departments")el.innerHTML=renderDeptsPage();else if(activePage==="kpi-history")el.innerHTML=renderHistoryPage();else if(activePage==="report")el.innerHTML=renderReportPage();else if(activePage==="assigned-tasks")el.innerHTML=renderAssignedTasksPage();else if(activePage==="graphic-assign")el.innerHTML=renderGraphicAssignPage();setTimeout(drawCharts,80);}

function getStats(){var tot=0,dn=0,aK=0,kc=0,st=0;DEPTS.forEach(function(d){var ts=tasks[d.id]||[];tot+=ts.length;dn+=ts.filter(function(t){return t.done;}).length;(kpis[d.id]||[]).forEach(function(k){aK+=k.val;kc++;});if(isStale(d.id))st++;});return {tot:tot,dn:dn,pct:tot?Math.round(dn/tot*100):0,ak:kc?Math.round(aK/kc):0,st:st};}

function renderOverviewPage(){
  var mg=isMgr(),s=getStats();
  var myD=DEPTS.find(function(d){return d.id===currentRole;});
  var myTs=myD?tasks[currentRole]||[]:[];
  var myKs=myD?kpis[currentRole]||[]:[];
  var myDn=myTs.filter(function(t){return t.done;}).length;
  var myAvg=myKs.length?Math.round(myKs.reduce(function(a,k){return a+k.val;},0)/myKs.length):0;
  var heroStats=mg?"<div style='text-align:center'><div style='font-size:18px;font-weight:800;color:#E8302A'>"+s.st+"</div><div style='font-size:9px;color:#5a5a72;text-transform:uppercase;letter-spacing:.06em'>Pending</div></div><div style='text-align:center'><div style='font-size:18px;font-weight:800;color:#F47B20'>"+s.dn+"/"+s.tot+"</div><div style='font-size:9px;color:#5a5a72;text-transform:uppercase;letter-spacing:.06em'>Tasks done</div></div><div style='text-align:center'><div style='font-size:18px;font-weight:800;color:"+kpiColor(s.ak)+"'>"+s.ak+"%</div><div style='font-size:9px;color:#5a5a72;text-transform:uppercase;letter-spacing:.06em'>Avg KPI</div></div>":"<div style='text-align:center'><div style='font-size:18px;font-weight:800;color:#F47B20'>"+myDn+"/"+myTs.length+"</div><div style='font-size:9px;color:#5a5a72;text-transform:uppercase;letter-spacing:.06em'>My tasks</div></div><div style='text-align:center'><div style='font-size:18px;font-weight:800;color:"+kpiColor(myAvg)+"'>"+myAvg+"%</div><div style='font-size:9px;color:#5a5a72;text-transform:uppercase;letter-spacing:.06em'>My KPI avg</div></div>";
  var deptCards="";
  if(mg){deptCards="<div style='margin-bottom:14px'><div class='sec-lbl' style='margin-bottom:8px'>Department overview — click to view details</div><div class='ov-dept-grid'>"+DEPTS.map(function(d){var ts=tasks[d.id]||[],ks=kpis[d.id]||[],dn2=ts.filter(function(t){return t.done;}).length,p=ts.length?Math.round(dn2/ts.length*100):0;return "<div class='odc' onclick='viewDeptFromOv('"+d.id+"')'><div class='odc-name'><div class='odc-dot' style='background:"+d.color+"'></div>"+d.label.split(" ")[0]+"</div><div class='odc-ring'>"+pRing(p,d.color,42)+"</div>"+ks.map(function(k){return "<div class='odc-krow'><span class='odc-kn'>"+k.name+"</span><div class='odc-kbg'><div class='odc-kfill' style='width:"+k.val+"%;background:"+kpiColor(k.val)+"'></div></div><span class='odc-kv' style='color:"+kpiColor(k.val)+"'>"+k.val+"%</span></div>";}).join("")+"<div class='odc-tasks'>"+dn2+"/"+ts.length+" tasks"+(isStale(d.id)?"<div class='stale-w'>No updates</div>":"")+"</div></div>";}).join("")+"</div></div>";}
  var assignCard="";
  if(mg||currentRole==="hr"){var multi=canMultiAssign();var dToggles=multi?"<div style='margin-bottom:8px'><div style='font-size:10px;color:#5a5a72;margin-bottom:6px'>Select departments (tap to toggle multiple):</div><div class='multi-dept-grid'>"+DEPTS.map(function(d){return "<div class='dept-toggle"+(selDepts.includes(d.id)?" sel":"")+" ' onclick='toggleDeptSel('"+d.id+"')'>"+d.label.split(" ")[0]+"</div>";}).join("")+"</div></div>":"";var singleSel=!multi?"<select class='sel-sm' id='ov-dept'>"+DEPTS.map(function(d){return "<option value='"+d.id+"'>"+d.label+"</option>";}).join("")+"</select>":"";assignCard="<div class='assign-card'><div class='assign-title'>"+(currentRole==="hr"?"Assign tasks to departments":(currentRole==="ceo"?"CEO task assignment":"Add task to department"))+"</div>"+dToggles+"<div class='add-row'><input type='text' id='ov-inp' placeholder='"+(multi?"Task for selected departments...":"Type task...")+"'>"+singleSel+"<select class='sel-sm' id='ov-pri'><option value='high'>High</option><option value='medium' selected>Medium</option><option value='low'>Low</option></select><button onclick='assignFromOverview()'>Assign</button></div></div>";}
  return "<div style='background:#141418;border:1px solid #2a2a35;border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap'>"+logoDiv("logo-md")+"<div style='flex:1'><div style='font-size:15px;font-weight:800;color:#f0f0f5'>Wave360 Africa</div><div style='font-size:11px;color:#5a5a72'>Think Beyond the Wave · "+getWeekLabel()+"</div></div><div style='display:flex;gap:14px;flex-wrap:wrap'>"+heroStats+"</div></div><div class='kpi-grid'><div class='kpi-card kc1'><div class='kpi-lbl'>Total tasks</div><div class='kpi-val'>"+s.tot+"</div><div class='kpi-sub'>"+s.dn+" completed</div></div><div class='kpi-card kc2'><div class='kpi-lbl'>Completion rate</div><div class='kpi-val'>"+s.pct+"%</div><div class='kpi-sub' style='color:"+(s.pct>=70?"#4dd4a0":"#ff6b6b")+"'>"+s.pct+"% done</div></div><div class='kpi-card kc3'><div class='kpi-lbl'>Avg KPI score</div><div class='kpi-val' style='color:"+kpiColor(s.ak)+"'>"+s.ak+"%</div><div class='kpi-sub'>"+kpiTrend(s.ak)+" "+(s.ak>=80?"Excellent":s.ak>=50?"Moderate":"Low")+"</div></div><div class='kpi-card kc4'><div class='kpi-lbl'>Depts updated</div><div class='kpi-val'>"+(DEPTS.length-s.st)+"<span style='font-size:13px;color:#5a5a72'>/"+DEPTS.length+"</span></div><div class='kpi-sub'>"+s.st+" yet to update</div></div></div><div class='charts-row'><div class='chart-card'><div class='chart-title'>Task completion <span class='chart-sub'>this week</span></div><canvas id='ch-donut' height='150'></canvas></div><div class='chart-card'><div class='chart-title'>KPI scores <span class='chart-sub'>by department</span></div><canvas id='ch-bar' height='150'></canvas></div></div>"+deptCards+assignCard+"<div id='dept-modal-area'></div>";
}

function viewDeptFromOv(id){var area=document.getElementById("dept-modal-area");if(!area)return;if(selDept===id){selDept=null;area.innerHTML="";return;}selDept=id;var d=DEPTS.find(function(x){return x.id===id;});if(!d)return;area.innerHTML=renderDeptDetailPanel(d,deptDetailTab[id]||"tasks");}
function toggleDeptSel(id){var i=selDepts.indexOf(id);if(i>-1)selDepts.splice(i,1);else selDepts.push(id);renderPage();}

function assignFromOverview(){
  var inp=document.getElementById("ov-inp"),ps=document.getElementById("ov-pri");
  var text=inp.value.trim();if(!text){showToast("Please type a task");return;}
  var isHR=currentRole==="hr",multi=canMultiAssign();
  var targets=multi?(selDepts.length>0?selDepts.slice():[DEPTS[0].id]):[(document.getElementById("ov-dept")||{}).value||DEPTS[0].id];
  var assigned=0;
  targets.forEach(function(tid){
    if((tasks[tid]||[]).length>=10){showToast("Max 10 tasks for "+(DEPTS.find(function(d){return d.id===tid;})||{}).label);return;}
    if(!tasks[tid])tasks[tid]=[];
    var nt={text:text,priority:ps.value,done:false,id:uid(),from_hr:isHR,from_ev:false,from_digital:false,fromHR:isHR,progress:"To Do"};
    tasks[tid].push(nt);assigned++;
    sb.from("tasks").insert({department:tid,text:text,priority:ps.value,done:false,week_label:getWeekLabel(),from_hr:isHR,from_ev:false,from_digital:false,progress:"To Do"}).then(function(){}).catch(function(){});
  });
  inp.value="";if(multi)selDepts=[];saveD();
  showToast(assigned>1?"Task assigned to "+assigned+" departments":"Task assigned!");
  renderPage();
}

function renderAssignedTasksPage(){
  var allAssigned=[];
  DEPTS.forEach(function(d){(tasks[d.id]||[]).forEach(function(t){if(t.from_hr||t.fromHR||t.from_digital){allAssigned.push(Object.assign({},t,{deptId:d.id,deptLabel:d.label,deptColor:d.color}));}});});
  var total=allAssigned.length,done=allAssigned.filter(function(t){return t.done;}).length,inProg=allAssigned.filter(function(t){return t.progress==="In Progress";}).length,review=allAssigned.filter(function(t){return t.progress==="Review";}).length;
  var byDept={};allAssigned.forEach(function(t){if(!byDept[t.deptId])byDept[t.deptId]={label:t.deptLabel,color:t.deptColor,tasks:[]};byDept[t.deptId].tasks.push(t);});
  var deptSections=Object.keys(byDept).map(function(did){var dept=byDept[did];var dDone=dept.tasks.filter(function(t){return t.done;}).length;return "<div style='background:#141418;border:1px solid #2a2a35;border-radius:10px;padding:12px;margin-bottom:10px'><div style='display:flex;align-items:center;gap:8px;margin-bottom:10px'><div style='width:8px;height:8px;border-radius:50%;background:"+dept.color+"'></div><span style='font-size:12px;font-weight:700;color:#f0f0f5;flex:1'>"+dept.label+"</span><span style='font-size:11px;font-weight:700;color:"+kpiColor(dept.tasks.length?Math.round(dDone/dept.tasks.length*100):0)+"'>"+dDone+"/"+dept.tasks.length+" done</span></div>"+dept.tasks.map(function(t){return "<div class='task-item'><div class='chk"+(t.done?" done":"")+" ' onclick='toggleTask('"+did+"','"+t.id+"',"+(!t.done)+")'></div><span class='task-txt"+(t.done?" done":"")+"'>"+t.text+"</span>"+(t.from_hr||t.fromHR?"<span class='hr-tag'>HR</span>":"")+(t.from_digital?"<span class='dg-tag'>Digital</span>":"")+"<span class='pf pf-"+(t.priority||"medium")+"'>"+((t.priority||"medium").toUpperCase())+"</span><select class='progress-sel' onchange='updateProgress('"+did+"','"+t.id+"',this.value)' style='background:"+STAGE_BG[t.progress||"To Do"]+";color:"+STAGE_COLORS[t.progress||"To Do"]+"'>"+ TASK_STAGES.map(function(s){return "<option value='"+s+"'"+((t.progress===s||(!t.progress&&s==="To Do"))?" selected":"")+">"+ s+"</option>";}).join("")+"</select></div>";}).join("")+"</div>";}).join("");

function addTask(deptId){var inp=document.getElementById("ni-"+deptId),pri=document.getElementById("pri-"+deptId);var text=inp.value.trim();if(!text){showToast("Please type a task");return;}if((tasks[deptId]||[]).length>=10){showToast("Max 10 tasks reached");return;}var nt={text:text,priority:pri?pri.value:"medium",done:false,id:uid(),from_hr:false,from_ev:false,from_digital:false,progress:"To Do"};if(!tasks[deptId])tasks[deptId]=[];tasks[deptId].push(nt);inp.value="";saveD();showToast("Task added");renderPage();sb.from("tasks").insert({department:deptId,text:text,priority:nt.priority,done:false,week_label:getWeekLabel(),from_hr:false,from_ev:false,from_digital:false,progress:"To Do"}).select().single().then(function(res){if(res.data){var i=(tasks[deptId]||[]).findIndex(function(t){return t.id===nt.id;});if(i>-1){tasks[deptId][i]=Object.assign({},tasks[deptId][i],res.data);saveD();}}}).catch(function(){});setTimeout(function(){var e=document.getElementById("ni-"+deptId);if(e)e.focus();},30);}
function setKpiLocal(deptId,idx,v){kpis[deptId][idx].val=parseInt(v);var el=document.getElementById("kv-"+deptId+"-"+idx);if(el)el.textContent=v+"%";}
function toggleKpiEdit(id){editingKpi=(editingKpi===id)?null:id;if(!editingKpi){saveD();var wl=getWeekLabel();sb.from("kpis").delete().eq("department",id).eq("week_label",wl).then(function(){var rows=kpis[id].map(function(k){return{department:id,name:k.name,val:k.val,week_label:wl};});sb.from("kpis").insert(rows).then(function(){}).catch(function(){});}).catch(function(){});showToast("KPIs saved");}renderPage();}

function renderEventsApp(){loadE();var canC=CAN_CREATE.includes(currentRole)||PROD.some(function(m){return m.id===currentRole;});var navT=["overview","projects","events","team"].map(function(id){var lb={overview:"Overview",projects:"Projects",events:"Events",team:"Team"};return "<button class='ev-tab"+(evNav===id?" active":"")+" ' onclick='setEvNav('"+id+"')'>"+lb[id]+"</button>";}).join("");document.getElementById("root").innerHTML="<div class='ev-wrap'><div class='ev-topbar'><div style='display:flex;align-items:center;gap:10px'>"+logoDiv("logo-sm")+"<div><div style='font-size:13px;font-weight:800;color:#fff'>Wave360 Africa</div><div style='font-size:9px;color:rgba(255,255,255,0.45);letter-spacing:.1em'>EVENTS & PROJECTS HUB</div></div></div><div style='display:flex;gap:6px;align-items:center;flex-wrap:wrap'><span style='font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid rgba(244,123,32,0.3);color:#F47B20;background:rgba(244,123,32,0.08)'>"+getRoleLabel()+"</span><span style='font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)'>"+today()+"</span>"+(canC?"<button style='font-size:11px;padding:4px 12px;border:none;border-radius:6px;background:#7B3FA0;color:#fff;cursor:pointer;font-weight:600' onclick='openEvModal()'>+ New</button>":"")+"<button style='font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.07);cursor:pointer' onclick='backToDash()'>Dashboard</button><button style='font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.07);cursor:pointer' onclick='logout()'>Lock</button></div></div><div class='ev-nav-bar'>"+navT+"</div><div class='ev-content' id='ev-pg'></div></div>"+renderEvModal();renderEvPage();}
function setEvNav(id){evNav=id;renderEvPage();}
function renderEvPage(){var el=document.getElementById("ev-pg");if(!el)return;if(evNav==="overview")el.innerHTML=renderEvOverview();else if(evNav==="projects")el.innerHTML=renderEvList("Project");else if(evNav==="events")el.innerHTML=renderEvList("Event");else if(evNav==="team")el.innerHTML=renderEvTeam();}

function renderEvOverview(){var pr=evState.projects.filter(function(p){return p.type==="Project";});var ev2=evState.projects.filter(function(p){return p.type==="Event";});var aT=evState.projects.flatMap(function(p){return p.tasks||[];});var cp=aT.filter(function(t){return t.status==="Done";}).length;var ip=aT.filter(function(t){return t.status==="In Progress";}).length;var canBC=CAN_BC.includes(currentRole);var bcs=(evState.broadcasts||[]).slice(-6).reverse();return "<div class='ev-stats'><div class='ev-stat'><div class='lbl'>Projects</div><div class='val'>"+pr.length+"</div></div><div class='ev-stat'><div class='lbl'>Events</div><div class='val'>"+ev2.length+"</div></div><div class='ev-stat'><div class='lbl'>Tasks done</div><div class='val' style='color:#4dd4a0'>"+cp+"</div></div><div class='ev-stat'><div class='lbl'>In progress</div><div class='val' style='color:#ffaa55'>"+ip+"</div></div></div><div class='bc-box'><div class='bc-title'><div class='bc-dot'></div>Company broadcasts</div><div class='bc-list'>"+(bcs.length?bcs.map(function(b){return "<div class='bc-item'><span class='bc-from'>"+b.from+"</span><span class='bc-msg'>"+b.msg+"</span><span class='bc-time'>"+b.time+"</span></div>";}).join(""):"<div style='font-size:11px;color:rgba(255,255,255,0.35);font-style:italic;padding:4px 0'>No broadcasts yet</div>")+"</div>"+(canBC?"<div class='bc-inp-row'><input type='text' id='bc-i' placeholder='Send message to all departments...' onkeydown='if(event.key==='Enter')sendBroadcast()'><button onclick='sendBroadcast()'>Broadcast</button></div>":"<div style='font-size:10px;color:rgba(255,255,255,0.25);margin-top:4px'>Only CEO, Judy and HR can broadcast</div>")+"</div>"+(evState.projects.length===0?"<div style='text-align:center;padding:2rem;color:#5a5a72;font-size:12px;font-style:italic'>No projects or events yet</div>":"<div class='sec-hdr'><div class='sec-ttl'>Recent activity</div></div><div class='proj-grid'>"+evState.projects.slice(-4).reverse().map(renderProjCard).join("")+"</div>");}
function sendBroadcast(){var inp=document.getElementById("bc-i");var msg=inp.value.trim();if(!msg)return;var from=getRoleLabel().split(" — ").pop();if(!evState.broadcasts)evState.broadcasts=[];evState.broadcasts.push({id:uid(),from:from,msg:msg,time:nowTime(),date:today()});if(evState.broadcasts.length>50)evState.broadcasts.shift();inp.value="";saveE();showToast("Broadcast sent");renderEvPage();}
function renderEvList(type){var items=evState.projects.filter(function(p){return p.type===type;});var canC=CAN_CREATE.includes(currentRole)||PROD.some(function(m){return m.id===currentRole;});return "<div class='sec-hdr'><div class='sec-ttl'>"+(type==="Project"?"Projects":"Events")+" ("+items.length+")</div>"+(canC?"<button class='add-btn-ev' onclick='openEvModal('"+type+"')'  >+ New "+type+"</button>":"")+"</div>"+(items.length===0?"<div style='text-align:center;padding:2rem;color:#5a5a72;font-size:12px;font-style:italic'>No "+type.toLowerCase()+"s yet</div>":"<div class='proj-grid'>"+items.map(renderProjCard).join("")+"</div>");}

function renderProjCard(p){var tks=p.tasks||[],dn=tks.filter(function(t){return t.status==="Done";}).length,pct=tks.length?Math.round(dn/tks.length*100):0;var canE=CAN_CREATE.includes(currentRole)||PROD.some(function(m){return m.id===currentRole;});var tR=tks.map(function(t){return "<div class='ptask'><div class='pt-status-dot' style='background:"+STAGE_COLORS[t.status||"To Do"]+"'></div><span class='ptask-text"+(t.status==="Done"?" Done":"")+"'>"+t.text+"</span><span class='ptask-asgn'>"+(t.assignee||"")+"</span>"+(t.assignedDepts&&t.assignedDepts.length?"<span style='font-size:9px;color:#ffaa55;padding:1px 5px;border-radius:3px;background:rgba(244,123,32,0.1)'>→"+t.assignedDepts.map(function(d){return (DEPTS.find(function(x){return x.id===d;})||{label:d}).label.split(" ")[0];}).join(",")+"</span>":"")+(canE?"<select class='ptask-ssel' onchange='updateProjTaskStatus('"+p.id+"','"+t.id+"',this.value)' style='background:"+STAGE_BG[t.status||"To Do"]+";color:"+STAGE_COLORS[t.status||"To Do"]+"'>"+ TASK_STAGES.map(function(s){return "<option value='"+s+"'"+((t.status===s||(!t.status&&s==="To Do"))?" selected":"")+">"+s+"</option>";}).join("")+"</select>":"<span style='font-size:9px;padding:1px 5px;border-radius:3px;background:"+STAGE_BG[t.status||"To Do"]+";color:"+STAGE_COLORS[t.status||"To Do"]+"'>"+(t.status||"To Do")+"</span>")+(canE?"<span class='ptask-del' onclick='deleteProjTask('"+p.id+"','"+t.id+"')'>✕</span>":"")+"</div>";}).join("");var addRow=canE?"<div class='pt-add'><input type='text' placeholder='Add task...' id='pt-"+p.id+"' onkeydown='if(event.key==='Enter')addProjTask('"+p.id+"')'><select class='asgn-sel' id='pa-"+p.id+"'>"+ALL_MEMBERS.map(function(m){return "<option value='"+m.label+"'>"+m.label+"</option>";}).join("")+"</select><select class='asgn-sel' id='pd-"+p.id+"' multiple style='height:32px'>"+DEPTS.map(function(d){return "<option value='"+d.id+"'>"+d.label.split(" ")[0]+"</option>";}).join("")+"</select><button onclick='addProjTask('"+p.id+"')'>+ Add</button></div><div style='font-size:9px;color:#5a5a72;margin-top:4px'>Hold Ctrl/Cmd to select multiple departments</div>":"";return "<div class='proj-card'><div class='proj-hdr'><div style='display:flex;align-items:center;gap:6px;margin-bottom:4px'><span class='proj-type pt-"+p.type+"'>"+p.type+"</span>"+(canE?"<span style='font-size:10px;color:#5a5a72;cursor:pointer;margin-left:auto' onclick='deleteProject('"+p.id+"')'   >Delete</span>":"")+"</div><div class='proj-name'>"+p.name+"</div>"+(p.desc?"<div class='proj-desc'>"+p.desc+"</div>":"")+"</div><div class='proj-meta'>"+(p.deadline?"<span>Due: "+p.deadline+"</span>":"")+"<span class='proj-owner'>"+p.owner+"</span><span style='margin-left:auto;color:"+(pct===100?"#4dd4a0":"#5a5a72")+(pct===100?";font-weight:700":"")+"'>"+pct+"% done</span></div><div class='proj-tasks-area'><div class='pt-ttl'>Tasks ("+dn+"/"+tks.length+")</div>"+(tks.length===0?"<div style='font-size:11px;color:#5a5a72;font-style:italic;padding:4px 0'>No tasks yet</div>":"")+tR+addRow+"</div></div>";}

function renderEvTeam(){var all=[{id:"ceo",label:"CEO",role:"Chief Executive",color:"#1a1a18"}].concat(PROD).concat(DEPTS.map(function(d){return Object.assign({},d,{role:d.label});}));return "<div class='sec-hdr'><div class='sec-ttl'>Wave360 Team</div></div><div class='team-grid'>"+all.map(function(m){var myT=evState.projects.flatMap(function(p){return (p.tasks||[]).filter(function(t){return t.assignee===m.label;});});var dn=myT.filter(function(t){return t.status==="Done";}).length;var init=m.label.split(" ").map(function(w){return w[0];}).join("").substring(0,2).toUpperCase();return "<div class='t-card'><div class='t-av' style='background:"+m.color+"'>"+init+"</div><div class='t-name'>"+m.label+"</div><div class='t-role'>"+(m.role||m.label)+"</div><div class='t-tasks'>"+dn+"/"+myT.length+" tasks</div></div>";}).join("")+"</div>";}

function renderEvModal(){return "<div class='modal-ov' id='ev-modal' style='display:none' onclick='closeEvModalBg(event)'><div class='modal'><div class='modal-ttl' id='em-ttl'>New Project / Event</div><div class='mf'><label>Type</label><select id='m-tp' style='width:100%;padding:8px 10px;border:1px solid #2a2a35;border-radius:7px;background:#1c1c22;color:#f0f0f5;font-size:12px'><option value='Project'>Project</option><option value='Event'>Event</option></select></div><div class='mf'><label>Name</label><input type='text' id='m-nm' placeholder='e.g. Brand Video Campaign'></div><div class='mf'><label>Description</label><textarea id='m-ds' placeholder='Brief description...'></textarea></div><div class='mf'><label>Owner / Lead</label><select id='m-ow' style='width:100%;padding:8px 10px;border:1px solid #2a2a35;border-radius:7px;background:#1c1c22;color:#f0f0f5;font-size:12px'>"+ALL_MEMBERS.map(function(m){return "<option value='"+m.label+"'>"+m.label+"</option>";}).join("")+"</select></div><div class='mf'><label>Deadline (optional)</label><input type='date' id='m-dl' style='color-scheme:dark'></div><div class='modal-btns'><button class='modal-cancel' onclick='closeEvModal()'>Cancel</button><button class='modal-save' onclick='saveProject()'>Create</button></div></div></div>";}
function openEvModal(tp){tp=tp||"Project";document.getElementById("ev-modal").style.display="flex";document.getElementById("m-tp").value=tp;document.getElementById("em-ttl").textContent="New "+tp;setTimeout(function(){var e=document.getElementById("m-nm");if(e)e.focus();},50);}
function closeEvModal(){document.getElementById("ev-modal").style.display="none";}
function closeEvModalBg(e){if(e.target.id==="ev-modal")closeEvModal();}
function saveProject(){var nm=document.getElementById("m-nm").value.trim();if(!nm){showToast("Please enter a name");return;}var p={id:uid(),type:document.getElementById("m-tp").value,name:nm,desc:document.getElementById("m-ds").value.trim(),owner:document.getElementById("m-ow").value,deadline:document.getElementById("m-dl").value,createdBy:getRoleLabel(),createdAt:today(),tasks:[]};evState.projects.push(p);saveE();closeEvModal();showToast(p.type+" '"+p.name+"' created");document.getElementById("m-nm").value="";document.getElementById("m-ds").value="";document.getElementById("m-dl").value="";renderEvPage();}
function deleteProject(id){if(!confirm("Delete this project/event?"))return;evState.projects=evState.projects.filter(function(p){return p.id!==id;});saveE();showToast("Deleted");renderEvPage();}
function addProjTask(pId){var inp=document.getElementById("pt-"+pId),as=document.getElementById("pa-"+pId),ds=document.getElementById("pd-"+pId);var text=inp.value.trim();if(!text){showToast("Please type a task");return;}var p=evState.projects.find(function(x){return x.id===pId;});if(!p)return;if(!p.tasks)p.tasks=[];var assignedDepts=ds?Array.from(ds.selectedOptions).map(function(o){return o.value;}):[];var nt={id:uid(),text:text,assignee:as?as.value:"",status:"To Do",assignedDepts:assignedDepts};p.tasks.push(nt);if(assignedDepts.length>0){assignedDepts.forEach(function(did){if(!tasks[did])tasks[did]=[];if(tasks[did].length<10){var dt={text:text,priority:"medium",done:false,id:uid(),from_hr:false,from_ev:true,from_digital:false,progress:"To Do",evTaskId:nt.id,evProjectId:pId};tasks[did].push(dt);sb.from("tasks").insert({department:did,text:text,priority:"medium",done:false,week_label:getWeekLabel(),from_hr:false,from_ev:true,from_digital:false,progress:"To Do"}).then(function(){}).catch(function(){});}});saveD();showToast("Task added + assigned to "+assignedDepts.length+" dept"+(assignedDepts.length>1?"s":""));}else{showToast("Task added to project");}inp.value="";saveE();renderEvPage();setTimeout(function(){var e=document.getElementById("pt-"+pId);if(e)e.focus();},30);}
function updateProjTaskStatus(pId,tId,status){var p=evState.projects.find(function(x){return x.id===pId;});if(!p)return;var t=(p.tasks||[]).find(function(x){return x.id===tId;});if(!t)return;t.status=status;if(t.assignedDepts&&t.assignedDepts.length>0){t.assignedDepts.forEach(function(did){var dt=(tasks[did]||[]).find(function(x){return x.evTaskId===tId||(x.from_ev&&x.text===t.text);});if(dt){dt.progress=status;if(status==="Done")dt.done=true;}});saveD();}saveE();renderEvPage();}
function deleteProjTask(pId,tId){var p=evState.projects.find(function(x){return x.id===pId;});if(!p)return;p.tasks=(p.tasks||[]).filter(function(t){return t.id!==tId;});saveE();renderEvPage();}

(async function(){
  try{if(!loadD())initData();loadE();archiveHistory();await syncFromDB();}
  catch(e){console.warn("Init:",e);if(!Object.keys(tasks).length)initData();}
  render();
})();
</script>
</body>
