<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Wave360 Africa | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0d0d0f; --bg2: #141418; --bg3: #1c1c22; --border: #2a2a35;
            --text: #f0f0f5; --text2: #9090a8; --orange: #F47B20; --green: #1D9E75;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* Original Sidebar Layout */
        .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); padding: 2rem; }
        .main { flex: 1; padding: 2rem; overflow-y: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg2); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); }
        .stat-val { font-size: 1.8rem; font-weight: bold; color: var(--orange); margin-top: 5px; }

        .dept-title { color: var(--text2); text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; margin: 2rem 0 1rem; border-left: 3px solid #7B3FA0; padding-left: 10px; }
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        
        .task-card { background: var(--bg3); padding: 1.2rem; border-radius: 10px; border: 1px solid var(--border); transition: 0.3s; }
        .task-card.is-done { border-color: var(--green); opacity: 0.7; }
        
        .task-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .progress-bar { height: 4px; background: #242430; border-radius: 2px; }
        .progress-fill { height: 100%; background: var(--orange); transition: width 0.4s; }

        #sync-status { font-size: 11px; color: var(--text2); }
        .syncing { color: var(--green); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2 style="color:var(--orange)">Wave360</h2>
        <p style="color:var(--text2); font-size: 12px; margin-top: 2rem;">MAIN MENU</p>
        <p style="margin-top: 1rem;">Dashboard</p>
    </aside>

    <main class="main">
        <div class="header">
            <div>
                <h1 style="margin:0">Operational Intelligence</h1>
                <p style="color:var(--text2); margin:5px 0 0">Real-time task synchronization</p>
            </div>
            <div id="sync-status">Connected</div>
        </div>

        <div class="stat-grid" id="stats"></div>
        <div id="dashboard-content">Initializing...</div>
    </main>

    <script>
        // Replace with your actual credentials
        const sb = supabase.createClient('https://cupmhvdqyramhedkyjig.supabase.co', 'YOUR_ANON_KEY');

        let T = {}; 
        let lastSync = new Date(0).toISOString();
        let isSyncing = false;

        async function init() {
            try {
                const { data, error } = await sb.from("tasks").select("*");
                if (error) throw error;
                processData(data);
                lastSync = new Date().toISOString();
                rPage();
            } catch (err) {
                document.getElementById('dashboard-content').innerHTML = "Check Supabase Column Names";
            }
        }

        function processData(data) {
            T = {};
            data.forEach(t => {
                const d = t.department || "General";
                if (!T[d]) T[d] = [];
                T[d].push(t);
            });
        }

        async function syncDB() {
            if (isSyncing) return;
            isSyncing = true;
            document.getElementById('sync-status').innerText = "Syncing...";
            try {
                const { data, error } = await sb.from("tasks").select("*").gt("updated_at", lastSync);
                if (!error && data.length) {
                    data.forEach(task => {
                        for (let d in T) {
                            let i = T[d].findIndex(ex => ex.id === task.id);
                            if (i > -1) T[d][i] = task;
                        }
                    });
                    lastSync = new Date().toISOString();
                    rPage();
                }
            } finally {
                isSyncing = false;
                document.getElementById('sync-status').innerText = "Connected";
            }
        }

        async function updateTask(id, updates) {
            // Find in local state
            let task;
            for (let d in T) {
                task = T[d].find(t => t.id === id);
                if (task) break;
            }
            if (!task) return;

            // Optimistic Update
            Object.assign(task, updates);
            rPage();

            await sb.from("tasks").update(updates).eq("id", id);
        }

        function rPage() {
            let html = '';
            let total = 0, done = 0;

            for (let dept in T) {
                html += `<div class="dept-title">${dept}</div><div class="task-grid">`;
                T[dept].forEach(t => {
                    total++; if(t.done) done++;
                    html += `
                        <div class="task-card ${t.done ? 'is-done' : ''}">
                            <div class="task-top">
                                <span>${t.title}</span>
                                <input type="checkbox" ${t.done ? 'checked' : ''} 
                                    onchange="updateTask('${t.id}', {done: this.checked})">
                            </div>
                            <div class="progress-bar"><div class="progress-fill" style="width:${t.progress}%"></div></div>
                        </div>`;
                });
                html += `</div>`;
            }

            document.getElementById('dashboard-content').innerHTML = html;
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">Total Tasks<div class="stat-val">${total}</div></div>
                <div class="stat-card">Completed<div class="stat-val">${done}</div></div>
                <div class="stat-card">Efficiency<div class="stat-val">${total ? Math.round(done/total*100) : 0}%</div></div>
            `;
        }

        setInterval(syncDB, 4000);
        init();
    </script>
</body>
</html>
